<head>

  <title>Global Success 8 - Ôn tập Giữa kỳ 2 | Unit 7, 8, 9 & Review 3 | Thầy Võ Ngọc Tùng</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
    }

    .hero-gradient-8 {
      /* Gradient for Environment (Green) to Shopping (Amber) to Disasters (Purple) */
      background: linear-gradient(135deg, #059669 0%, #0d9488 25%, #7c3aed 60%, #d97706 100%);
    }

    .gradient-text {
      background: linear-gradient(135deg, #059669 0%, #7c3aed 50%, #d97706 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(3, 105, 161, 0.7);
      }

      70% {
        transform: scale(1);
        box-shadow: 0 0 0 10px rgba(3, 105, 161, 0);
      }

      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(3, 105, 161, 0);
      }
    }

    .pulse-btn {
      animation: pulse-ring 2s infinite;
    }

    /* Custom scrollbar for modal */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #c7c7c7;
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }
  </style>
